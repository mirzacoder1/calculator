<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Responsive Calculator</title>

    <link rel="stylesheet" href="./calculator.css">
    <style>
        .link {
            color: white;
            list-style: none;
            /* border: 2px solid white; */
            margin: 15px;
            /* width: 70px;
            height: 35px; */
            display: inline-block;

        }
        .in {
            float: right;
            margin: 13px;
        }

        
        #link {
            position: fixed;
            width: 100%;
            border: 2px solid black;
            background-color: saddlebrown;
        }

        html {
            font-size: 10px;
            box-sizing: border-box;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: inherit;
        }

        .calculator {
            border: 1px solid #1E1E1E;
            border-radius: 5px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
        }

        .calculator-screen {
            width: 100%;
            font-size: 5rem;
            height: 80px;
            border: none;
            background-color: #5D5A58;
            color: #fff;
            text-align: right;
            padding-right: 20px;
            padding-left: 30px;
        }

        button {
            height: 60px;
            border: 1px solid #5E5C5C;
            font-size: 2rem;
            color: #fff;
            background-color: #848281;
        }

        button:focus {
            outline: none;
        }

        .operator,
        .equal-sign {
            background-color: #FF9D00;
        }

        .clear,
        .plus-minus,
        .percent {
            background-color: #6E6D6D;
        }

        .calculator-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background-color: #5D5A58;
        }

        .btn-lg {
            grid-column: 1 / 3;
        }


        body {
            background: rgb(203, 157, 245) url(/bold.jpg) no-repeat fixed center;
        }

        .number,
        .operator,
        .decimal,
        .clear,
        .equal-sign,
        .plus,
        .plus-minus,
        .percent,
        .squared,
        .cubed,
        .del,
        .symbol {
            background-color: aqua;
            color: black;
            border-radius: 100%;
            box-shadow: 2px 2px 5px palevioletred;
        }

        .calculator-screen {
            background-color: aliceblue;
            color: black;
        }

        .AC,
        .del {
            background-color: grey;
            color: whitesmoke;
        }

        .number,
        .operator,
        .decimal,
        .clear:hover,
        .equal-sign:hover,
        .plus:hover,
        .plus-minus:hover,
        .percent:hover,
        .squared:hover,
        .cubed:hover,
        .del:hover,
        .symbol:hover {
            text-shadow: 2px 2px 5px red;

        }


        .del:hover,
        .AC:hover {
            background-color: rgb(124, 22, 22);
            color: whitesmoke;
            transform: rotate(360deg);
            transition: 5s;
        }
    </style>
</head>

<body>

    <div id="link">
        <a class="link" href="https:\\google.com" target="_blank">Google is here</a>
        <a class="link" href="https:\\facebook.com" target="_blank">facebook is here</a>
        <a class="link" href="https:\\meesho.com" target="_blank">meesho is here</a>
        <a class="link" href="https:\\instagram.com" target="_blank">instagram is here</a>
        <input type="text" name="search" placeholder="search" class="in">
    </div>

    <div class="calculator">

        <input type="text" class="calculator-screen" value="0" disabled />

        <div class="calculator-keys">

            <button type="button" class="symbol" value="MC">mc</button>
            <button type="button" class="symbol" value="M+">m+</button>
            <button type="button" class="symbol" value="M-">m-</button>
            <button type="button" class="symbol" value="MR">mr</button>

            <button type="button" class="AC clear" value="clear">AC</button>
            <button type="button" class="symbol" value="arrow">&larr;</button>
            <button type="button" class="plus-minus" value="plus-minus">+/-</button>
            <button type="button" class="del" value="delete">Del</button>

            <button type="button" class="percent" value="percent">%</button>
            <button type="button" class="squared" value="squared">&#8339;2</button>
            <button type="button" class="cubed" value="cubed">&#8339;3</button>
            <button type="button" class="operator" value="+">+</button>

            <button type="button" class="number" value="7">7</button>
            <button type="button" class="number" value="8">8</button>
            <button type="button" class="number" value="9">9</button>
            <button type="button" class="operator" value="/">&divide;</button>


            <button type="button" class="number" value="4">4</button>
            <button type="button" class="number" value="5">5</button>
            <button type="button" class="number" value="6">6</button>
            <button type="button" class="operator" value="*">&times;</button>

            <button type="button" class="number" value="1">1</button>
            <button type="button" class="number" value="2">2</button>
            <button type="button" class="number" value="3">3</button>
            <button type="button" class="operator" value="-">-</button>

            <button type="button" class="number btn-lg" value="0">0</button>
            <button type="button" class="decimal" value=".">.</button>
            <button type="button" class="equal-sign" value="=">=</button>


        </div>
    </div>
</body>

</html>
